{{ define "main" }}
<article class="project-single">
    <header class="project-header">
        <div class="project-category">{{ .Params.category }}</div>
        <h1 class="project-title">{{ .Title }}</h1>
        <div class="project-meta">{{ .Params.location }} · {{ .Date.Format "2006-01-02" }}</div>
    </header>
    <div class="project-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
