baseurl = "https://yushutan.com"
languageCode = "zh-CN"
theme = "stack"
title = "魚叔的數字花園"

# 分页
paginate = 10

[params]
  mainSections = ["posts"]
  # 头像
  sidebar.avatar = ""
  # 描述
  sidebar.subtitle = "Live in the present · 咖啡 · 从化 · 生活"

  # 文章目录
  article.toc = true

  # 日期格式
  dateFormat.published = "2006-01-02"

  # 社交媒体
  [params.social]
    redbook = { icon = "link", link = { to = "https://www.xiaohongshu.com/user/profile/814520216", title = "小红书" } }

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 3

# 支持中文标签
[taxonomies]
  category = "categories"
  tag = "tags"
